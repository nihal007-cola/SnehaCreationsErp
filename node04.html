<!-- Node 04: BOM Approval -->
<div class="form-section">
  <h4>✅ BOM Approval</h4>
  <div class="form-row">
    <div><label>Costing Token Ref</label><input id="approvalCostToken" placeholder="SC-FY26-FG102-001-COST" /></div>
    <div><label>Approval Status</label><select id="approvalStatus"><option>Pending</option><option>Approved</option><option>Rejected</option></select></div>
    <div><label>Maker</label><input id="approvalMaker" placeholder="Maker ID" /></div>
    <div><label>Checker</label><input id="approvalChecker" placeholder="Checker ID" /></div>
  </div>
  <div class="form-row">
    <div><label>Remarks</label><textarea id="approvalRemarks" placeholder="Approval remarks..."></textarea></div>
    <div><label>Timestamp</label><input id="approvalTimestamp" type="datetime-local" /></div>
  </div>
  <div class="form-actions">
    <button class="btn btn-primary btn-submit">✅ Submit Approval</button>
  </div>
</div>
