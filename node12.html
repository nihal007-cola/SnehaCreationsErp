<!-- Node 12: RM Return -->
<div class="form-section">
  <h4>↩️ RM Return</h4>
  <div class="form-row">
    <div><label>Failed Qty Ref</label><input id="returnFailedRef" placeholder="QC failed token" /></div>
    <div><label>Debit Note No</label><input id="returnDebitNote" placeholder="Debit note number" /></div>
    <div><label>Tax Reversal</label><input id="returnTaxReversal" type="number" step="0.01" placeholder="0.00" /></div>
    <div><label>Return E-Way Bill</label><input id="returnEwb" placeholder="E-Way bill" /></div>
  </div>
  <div class="form-row">
    <div><label>Notes</label><textarea id="returnNotes" placeholder="Return notes..."></textarea></div>
  </div>
  <div class="form-actions">
    <button class="btn btn-danger btn-submit">↩️ Process Return</button>
  </div>
</div>
