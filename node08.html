<!-- Node 08: PO Approval -->
<div class="form-section">
  <h4>✅ PO Approval</h4>
  <div class="form-row">
    <div><label>PO Token Ref</label><input id="poApprovalToken" placeholder="SC-FY26-PO-001" /></div>
    <div><label>Approval Status</label><select id="poApprovalStatus"><option>Pending</option><option>Approved</option><option>Rejected</option></select></div>
    <div><label>Rejection Reason</label><textarea id="poApprovalReason" placeholder="If rejected, provide reason..."></textarea></div>
  </div>
  <div class="form-actions">
    <button class="btn btn-primary btn-submit">✅ Submit Approval</button>
  </div>
</div>
