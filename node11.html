<!-- Node 11: Quality Inspection -->
<div class="form-section">
  <h4>🔬 Quality Inspection</h4>
  <div class="form-row">
    <div><label>Dispatch Token Ref</label><input id="qcDispatchToken" placeholder="SC-FY26-DISP-001" /></div>
    <div><label>Passed Qty</label><input id="qcPassed" type="number" placeholder="0" data-calc="qc" /></div>
    <div><label>Failed Qty</label><input id="qcFailed" type="number" placeholder="0" data-calc="qc" /></div>
    <div><label>Inspector ID</label><input id="qcInspector" placeholder="Inspector ID" /></div>
  </div>
  <div class="form-row">
    <div><label>Defect Photo</label><input id="qcPhoto" type="text" placeholder="Photo URL / path" /></div>
    <div><label>Notes</label><textarea id="qcNotes" placeholder="QC notes..."></textarea></div>
  </div>
  <div class="form-actions">
    <button class="btn btn-warning btn-submit">🔬 Record QC</button>
  </div>
</div>
