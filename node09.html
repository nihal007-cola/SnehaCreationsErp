<!-- Node 09: Inbound Logistics -->
<div class="form-section">
  <h4>🚚 Inbound Logistics</h4>
  <div class="form-row">
    <div><label>Transporter Name</label><input id="logTransporter" placeholder="Transporter name" /></div>
    <div><label>GSTIN</label><input id="logGstin" placeholder="15-digit GSTIN" maxlength="15" /></div>
    <div><label>Vehicle No</label><input id="logVehicle" placeholder="Vehicle number" /></div>
    <div><label>Est. Arrival</label><input id="logArrival" type="date" /></div>
  </div>
  <div class="form-row">
    <div><label>Notes</label><textarea id="logNotes" placeholder="Logistics notes..."></textarea></div>
  </div>
  <div class="form-actions">
    <button class="btn btn-success btn-submit">🚚 Save Logistics</button>
  </div>
</div>
