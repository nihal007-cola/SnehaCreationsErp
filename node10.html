<!-- Node 10: RM Dispatch -->
<div class="form-section">
  <h4>📦 RM Dispatch (Supplier)</h4>
  <div class="form-row">
    <div><label>Dispatch Token Ref</label><input id="dispatchToken" placeholder="SC-FY26-DISP-001" /></div>
    <div><label>Invoice No</label><input id="dispatchInvoice" placeholder="Supplier invoice number" /></div>
    <div><label>Date</label><input id="dispatchDate" type="date" /></div>
    <div><label>E-Way Bill No</label><input id="dispatchEwb" placeholder="E-Way bill (if >₹50k)" /></div>
  </div>
  <div class="form-row">
    <div><label>AWB Scan</label><input id="dispatchAwb" placeholder="AWB / Tracking number" /></div>
    <div><label>Notes</label><textarea id="dispatchNotes" placeholder="Dispatch notes..."></textarea></div>
  </div>
  <div class="form-actions">
    <button class="btn btn-warning btn-submit">📦 Record Dispatch</button>
  </div>
</div>
