<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneha Creations ERP</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <h2>Sneha ERP</h2>
            <button class="tab-link active" onclick="openModule(event, 'orders-bom')">Orders & BOM</button>
            <button class="tab-link" onclick="openModule(event, 'procurement')">Procurement</button>
            <button class="tab-link" onclick="openModule(event, 'warehouse')">Warehouse</button>
            <button class="tab-link" onclick="openModule(event, 'production')">Production</button>
            <button class="tab-link" onclick="openModule(event, 'settings')">Settings</button>
            <button class="tab-link" onclick="openModule(event, 'reports')">Reports</button>
        </nav>
        <main class="content-area">
            <div id="orders-bom" class="module-content" style="display: block;">
                <h3>N1: FG Order Acceptance</h3>
                <div class="action-bar">
                    <button class="btn-secondary" onclick="alert('Download CSV')">Download Format</button>
                    <input type="file" id="n1-bulk-upload" accept=".csv">
                </div>
                <form id="form-n1" class="erp-form">
                    <div class="form-grid">
                        <input type="text" id="buyer-name" placeholder="Buyer Name" required>
                        <input type="text" id="buyer-gstin" placeholder="Buyer GSTIN" required>
                        <select id="buyer-state-code" required>
                            <option value="">State Code</option>
                            <option value="27">27 - MH</option>
                        </select>
                        <input type="text" id="fg-item" placeholder="FG Item Name" required>
                        <input type="text" id="hsn-code" placeholder="HSN Code" required>
                        <input type="number" id="order-qty" placeholder="Total Qty" required>
                        <input type="date" id="delivery-date" required>
                        <input type="text" id="size-matrix" placeholder="Size Breakup (S:10, M:20)">
                    </div>
                    <textarea id="n1-notes" placeholder="Notes / Tax Slab Details" rows="3"></textarea>
                    <button type="submit" class="btn-primary">Generate ART Token</button>
                </form>
            </div>
            <div id="procurement" class="module-content"><p>Procurement Module Active</p></div>
            <div id="warehouse" class="module-content"><p>Warehouse Module Active</p></div>
            <div id="production" class="module-content"><p>Production Module Active</p></div>
            <div id="settings" class="module-content"><p>Settings Module Active</p></div>
            <div id="reports" class="module-content"><p>Reports Module Active</p></div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
